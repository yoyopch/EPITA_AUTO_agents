services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER:-langchain}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-langchain123}
      POSTGRES_DB: ${DB_NAME:-langchain_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
